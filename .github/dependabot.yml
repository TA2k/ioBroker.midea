# Dependabot will run on day 19 of each month at 02:39 (Europe/Berlin timezone)
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      timezone: "Europe/Berlin"
      cronjob: "39 2 19 * *"
    open-pull-requests-limit: 20
    assignees:
      - "TA2k"
    versioning-strategy: "increase"
